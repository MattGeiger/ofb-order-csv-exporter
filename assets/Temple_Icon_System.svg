<svg id="Icon" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512">
  <defs>
    <style>
      /* Declare support for both colour schemes */
      :root { color-scheme: light dark; }

      /* Light mode → black */
      @media (prefers-color-scheme: light) {
        .theme-color { fill:#000000; }
      }

      /* Dark mode → white */
      @media (prefers-color-scheme: dark) {
        .theme-color { fill:#ffffff; }
      }

      /* SVGs are transparent by default; rule left for clarity */
      svg { background-color:transparent; }
    </style>
  </defs>

